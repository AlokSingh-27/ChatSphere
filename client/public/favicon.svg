<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main sphere gradient -->
    <linearGradient id="sphereGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="50%" stop-color="#14B8A6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>

    <!-- Orbit dashed ring gradient -->
    <linearGradient id="orbitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.7" />
      <stop offset="50%" stop-color="#14B8A6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.7" />
    </linearGradient>

    <!-- Overlay glow gradient -->
    <radialGradient id="sphereHighlight" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Ambient background glow (simulated for favicon visibility) -->
  <circle cx="50" cy="50" r="48" fill="#14B8A6" fill-opacity="0.08" filter="blur(2px)" />

  <!-- Orbit Ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#orbitGradient)" stroke-width="1.2" stroke-dasharray="6 8" stroke-opacity="0.6" />
  <circle cx="50" cy="6" r="3" fill="#2DD4BF" />

  <!-- Sphere Base -->
  <circle cx="50" cy="50" r="32" fill="url(#sphereGrad)" />

  <!-- Globe Grid lines -->
  <path d="M 22,50 A 28,28 0 0,0 78,50" fill="none" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.2" />
  <path d="M 50,18 A 32,32 0 0,0 50,82" fill="none" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.2" />
  <path d="M 50,18 A 16,32 0 0,0 50,82" fill="none" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.3" />
  <path d="M 50,18 A 16,32 0 0,1 50,82" fill="none" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.3" />

  <!-- Chat Bubble Cutout -->
  <path d="M 38,42 H 62 A 5,5 0 0,1 67,47 V 57 A 5,5 0 0,1 62,62 H 46 L 38,68 V 62 A 5,5 0 0,1 33,57 V 47 A 5,5 0 0,1 38,42 Z" fill="#020617" fill-opacity="0.15" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Three modern chatting dots -->
  <circle cx="44" cy="52" r="1.5" fill="#ffffff" />
  <circle cx="50" cy="52" r="1.5" fill="#ffffff" fill-opacity="0.8" />
  <circle cx="56" cy="52" r="1.5" fill="#ffffff" fill-opacity="0.6" />

  <!-- Glass highlight glare -->
  <circle cx="50" cy="50" r="32" fill="url(#sphereHighlight)" pointer-events="none" />
</svg>
